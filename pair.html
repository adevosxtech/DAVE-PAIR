<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAVE-X | Pair Code</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#111827">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
  --primary:#6366f1;
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e2e8f0;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

header{
  padding:1.2rem 2rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#0b1220;
}

header h1{
  font-size:1.4rem;
  color:var(--primary);
}

section{
  padding:3rem 1.5rem;
  max-width:800px;
  margin:auto;
  width:100%;
}

.card{
  background:var(--card);
  padding:2rem;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

input{
  width:100%;
  padding:0.9rem;
  margin:1rem 0;
  border-radius:8px;
  border:none;
  background:#0f172a;
  color:white;
}

button{
  width:100%;
  padding:0.9rem;
  border:none;
  border-radius:8px;
  background:var(--primary);
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top:8px;
}

button:hover{
  opacity:0.9;
}

#pair-result{
  margin-top:1.5rem;
  text-align:center;
}

.code-box{
  background:#0f172a;
  padding:1rem;
  border-radius:10px;
  font-size:1.2rem;
  letter-spacing:2px;
  margin-bottom:10px;
}

.deploy-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:1rem;
}

.deploy-btn{
  display:block;
  padding:1rem;
  text-align:center;
  background:var(--card);
  border-radius:12px;
  text-decoration:none;
  color:white;
  border:1px solid #334155;
}

.deploy-btn:hover{
  background:var(--primary);
}

footer{
  text-align:center;
  padding:1.2rem;
  margin-top:auto;
  background:#0b1220;
  font-size:0.85rem;
}
</style>
</head>

<body>

<header>
  <h1>DAVE-X</h1>
</header>

<section>
  <div class="card">
    <h2>Get Pair Code</h2>
    <p>Enter your WhatsApp number with country code.</p>
    <input type="text" id="number" placeholder="2547XXXXXXXX">
    <button onclick="generateCode()">Generate Code</button>

    <div id="pair-result"></div>
  </div>
</section>

<section>
  <h2 style="margin-bottom:1.5rem;">Deploy DAVE-X</h2>
  <div class="deploy-grid">

    <a href="https://dashboard.heroku.com/new?template=https://github.com/Davex-254/Davex-254"
       class="deploy-btn">
       <i class="fab fa-heroku"></i> Deploy on Heroku
    </a>

    <a href="https://railway.app/new/template?repo=https://github.com/Davex-254/Davex-254"
       class="deploy-btn">
       <i class="fas fa-train"></i> Deploy on Railway
    </a>

    <a href="https://render.com/deploy?repo=https://github.com/Davex-254/Davex-254"
       class="deploy-btn">
       <i class="fas fa-server"></i> Deploy on Render
    </a>

    <!-- BOT ZIP RETAINED -->
    <a href="https://github.com/Davex-254/Davex-254/archive/refs/heads/main.zip"
       class="deploy-btn">
       <i class="fas fa-download"></i> Download Bot ZIP
    </a>

  </div>
</section>

<footer>
© <span id="year"></span> DAVE-X
</footer>

<script>
document.getElementById("year").innerText = new Date().getFullYear();

async function generateCode(){
  const num = document.getElementById("number").value.replace(/\D/g,'');
  if(!num) return alert("Enter valid number");

  const resultBox = document.getElementById("pair-result");
  resultBox.innerHTML = "Generating...";

  try{
    // ✅ CALLING ORIGINAL ROUTE '/'
    const res = await fetch(`/?number=${num}`);
    const data = await res.json();

    if(!data.code){
      resultBox.innerHTML = "Service unavailable";
      return;
    }

    resultBox.innerHTML = `
      <div class="code-box" id="generated-code">${data.code}</div>
      <button onclick="copyCode()">Copy Code</button>
    `;

  }catch(err){
    resultBox.innerHTML = "Error generating code.";
  }
}

function copyCode(){
  const code = document.getElementById("generated-code").innerText;
  navigator.clipboard.writeText(code);
  alert("Code copied successfully!");
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js');
}
</script>

</body>
</html>
